name: Release

# Build, sign, and publish a GitHub release whenever a version tag is pushed.
# Tagging flow (use the helper):
#   bun run release:tag patch        # bumps versions, commits, tags, pushes
# The workflow then builds the installers on Windows + Linux, signs the updater
# artifacts, creates the release, and uploads latest.json for the in-app updater.
#
# Produces:
#   ExileCompass_<version>_x64-setup.exe    (Windows, NSIS)
#   ExileCompass_<version>_amd64.AppImage   (Linux, portable + auto-updater)
#   ExileCompass_<version>_amd64.deb        (Linux, native Debian/Ubuntu install)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles nsis'
          - platform: ubuntu-22.04
            args: '--bundles appimage,deb'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Tauri v2 Linux build prerequisites (webkit, appindicator, xdo for the
      # global-shortcut plugin, rsvg, patchelf for AppImage bundling).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The signing key was generated without a password. GitHub forbids
          # empty secrets, so we pass an empty string literal here instead.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ExileCompass ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # After the release (and its .deb asset) is published, bump the AUR -bin
  # package to the new version: pkgver + checksums + .SRCINFO, then push.
  #
  # One-time setup: add an SSH *private* key as the `AUR_SSH_PRIVATE_KEY` repo
  # secret, with its matching public key registered on the maintainer's AUR
  # account (https://aur.archlinux.org/account). Runs in an Arch container so
  # makepkg / updpkgsums are available.
  publish-aur:
    needs: release
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install tooling
        run: pacman -Syu --noconfirm --needed git openssh pacman-contrib sudo

      - name: Bump and push the AUR package
        env:
          REF_NAME: ${{ github.ref_name }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"

          # makepkg / updpkgsums refuse to run as root — do the work as a
          # dedicated unprivileged user.
          useradd -m builder

          # SSH key + host config for the AUR, owned by the build user.
          install -d -m 700 -o builder -g builder /home/builder/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /home/builder/.ssh/id_aur
          cat > /home/builder/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/id_aur
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 /home/builder/.ssh/id_aur /home/builder/.ssh/config
          chown -R builder:builder /home/builder/.ssh

          sudo -u builder env HOME=/home/builder VERSION="$version" bash -euo pipefail <<'EOSU'
          cd "$HOME"
          git clone ssh://aur@aur.archlinux.org/exilecompass-bin.git aur
          cd aur
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          updpkgsums                                   # downloads the release .deb, fills sha256sums
          makepkg --printsrcinfo > .SRCINFO
          git config user.name "exilecompass-release"
          git config user.email "ipajudd@gmail.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR package already at ${VERSION}; nothing to push."
          else
            git commit -m "Update to ${VERSION}"
            git push
          fi
          EOSU
