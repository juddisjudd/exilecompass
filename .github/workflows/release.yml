name: Release

# Build, sign, and publish a GitHub release whenever a version tag is pushed.
# Tagging flow (use the helper):
#   bun run release:tag patch        # bumps versions, commits, tags, pushes
# The workflow then builds the installers on Windows + Linux, signs the updater
# artifacts, creates the release, and uploads latest.json for the in-app updater.
#
# Produces:
#   ExileCompass_<version>_x64-setup.exe    (Windows, NSIS)
#   ExileCompass_<version>_amd64.AppImage   (Linux)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--bundles nsis'
          - platform: ubuntu-22.04
            args: '--bundles appimage'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Tauri v2 Linux build prerequisites (webkit, appindicator, xdo for the
      # global-shortcut plugin, rsvg, patchelf for AppImage bundling).
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The signing key was generated without a password. GitHub forbids
          # empty secrets, so we pass an empty string literal here instead.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ExileCompass ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
