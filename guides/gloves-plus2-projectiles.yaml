# See guides/README.md for the full format. Items are referenced by their
# in-game name and the build resolves the icon 1:1 from that name.

id: gloves-plus2-projectiles
slot: gloves
name: "+2 Projectiles (Ice Shot / Twisters)"
goal: "Attack gloves: fractured T1 flat damage, +2 Projectiles, crit damage and additional-projectile chance."
author:
  name: ExileCompass
base: Secured Wraps
ilvl: 80

steps:
  - id: base
    title: Start with the base gloves
    detail: 'Get an Exceptional "Secured Wraps" base to craft on.'
    items:
      - Secured Wraps

  - id: kolrs-hunt
    title: Insert Kolr's Hunt
    detail: Socket Kolr's Hunt into the gloves.
    items:
      - Kolr's Hunt

  - id: perfect-aug
    title: Use a Perfect Orb of Augmentation
    items:
      - Perfect Orb of Augmentation

  - id: perfect-regal
    title: Use a Perfect Regal Orb
    items:
      - Perfect Regal Orb

  - id: roll-t1-prefix
    title: Roll a T1 flat damage prefix
    detail: Use Chaos Orbs and Orbs of Annulment until you roll a Tier 1 prefix such as T1 Lightning, Fire or Physical Damage to Attacks.
    targets:
      - { text: "Adds # to # Lightning Damage to Attacks", tag: prefix }
      - { text: "Adds # to # Fire Damage to Attacks", tag: prefix }
      - { text: "Adds # to # Physical Damage to Attacks", tag: prefix }
    repeat: true
    items:
      - Chaos Orb
      - Orb of Annulment

  - id: fracture
    title: Fracture the T1 prefix
    detail: Use a Fracturing Orb with a Preserved Rib to fracture the T1 prefix.
    items:
      - Fracturing Orb
      - Preserved Rib
    branches:
      - if: success
        text: The T1 prefix is fractured — continue to the next step.
      - if: fail
        text: It fractured the wrong mod — start over from the beginning.

  - id: chaos-spam-projectiles
    title: Chaos spam for +2 Projectiles
    detail: Chaos spam the fractured gloves until you hit the +2 Projectiles modifier.
    targets:
      - { text: "+2 to Level of all Projectile Skills", tag: prefix }
    repeat: true
    items:
      - Chaos Orb

  - id: crit-suffix
    title: Guarantee the Critical Damage suffix
    detail: Use Omen of Sinistral Exaltation + Exalted Orb, then Omen of Sinistral Crystallisation + Essence of Hysteria to guarantee Critical Damage on a suffix.
    items:
      - Omen of Sinistral Exaltation
      - Exalted Orb
      - Omen of Sinistral Crystallisation
      - Essence of Hysteria

  - id: unveil-projectile-suffix
    title: Unveil the additional-projectile suffix
    detail: 'Use an Ancient Rib with Omen of Dextral Necromancy, Omen of Light and Omen of Abyssal Echoes to unveil a suffix — you want "+#% Surpassing chance to Fire an Additional Projectile". Annul and repeat until you hit it.'
    targets:
      - { text: "#% Surpassing chance to Fire an Additional Projectile", tag: suffix }
    repeat: true
    items:
      - Ancient Rib
      - Omen of Dextral Necromancy
      - Omen of Light
      - Omen of Abyssal Echoes
      - Orb of Annulment

  - id: exalt-prefix
    title: Exalt the open prefix
    detail: Use a Greater or Perfect Exalted Orb to fill a prefix.
    items:
      - Exalted Orb

  - id: whittle-final-prefix
    title: Whittle to the final prefix
    detail: Use Omen of Whittling + Chaos Orb to reroll the lowest-level mod until you land a desirable final prefix.
    repeat: true
    items:
      - Omen of Whittling
      - Chaos Orb
    branches:
      - if: fail
        text: "If the whittle hits a bad mod (like Runic Ward): insert Astrid's Creativity, then use Sovereign Alloy + Omen of Sinistral Crystallisation to safely remove the prefix, and keep whittling."
        items:
          - Astrid's Creativity
          - Sovereign Alloy
          - Omen of Sinistral Crystallisation

# The target mods the finished item should have. `optional` marks alternatives /
# nice-to-haves (here, you'll fracture one of the three damage types).
result:
  - { text: "+2 to Level of all Projectile Skills", tag: prefix }
  - { text: "Adds # to # Lightning Damage to Attacks", tag: fractured, alt: true }
  - { text: "Adds # to # Fire Damage to Attacks", tag: fractured, alt: true }
  - { text: "Adds # to # Physical Damage to Attacks", tag: fractured, alt: true }
  - { text: "+#% to Critical Damage Bonus", tag: suffix }
  - { text: "#% Surpassing chance to Fire an Additional Projectile", tag: suffix }
