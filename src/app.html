<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />

		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		/>

		<title>ExileCompass</title>
		<style>
			html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #070709; }
			#ec-bootstrap-fallback {
				position: fixed;
				inset: 0;
				display: none;
				align-items: center;
				justify-content: center;
				padding: 20px;
				background: #070709;
				color: #e8e4de;
				font-family: 'Segoe UI', Arial, sans-serif;
				text-align: left;
				z-index: 2147483647;
			}
			#ec-bootstrap-fallback .box {
				max-width: 520px;
				width: 100%;
				background: #101014;
				border: 1px solid #34343a;
				border-radius: 8px;
				padding: 14px;
			}
			#ec-bootstrap-fallback .title {
				font-size: 14px;
				font-weight: 600;
				margin: 0 0 8px;
			}
			#ec-bootstrap-fallback .hint {
				font-size: 12px;
				line-height: 1.45;
				opacity: 0.92;
				margin: 0;
				white-space: pre-wrap;
			}
		</style>
		<script>
			(function () {
				var shown = false;
				function showFallback(message) {
					if (shown) return;
					shown = true;
					var el = document.getElementById('ec-bootstrap-fallback');
					if (!el) return;
					var text = document.getElementById('ec-bootstrap-fallback-text');
					if (text) text.textContent = message;
					el.style.display = 'flex';
				}

				window.addEventListener('error', function (ev) {
					var detail = ev && ev.message ? ev.message : 'Unknown script error';
					showFallback('Frontend startup failed.\n\n' + detail + '\n\nRun from terminal and share output.');
				});

				window.addEventListener('unhandledrejection', function (ev) {
					var reason = ev && ev.reason ? String(ev.reason) : 'Unknown async error';
					showFallback('Frontend startup failed (async).\n\n' + reason + '\n\nRun from terminal and share output.');
				});

				window.setTimeout(function () {
					var hasContent = !!document.querySelector('.app-shell');
					if (!hasContent && document.readyState !== 'loading') {
						showFallback('ExileCompass UI did not initialize.\n\nThis is usually a Linux WebKit runtime compatibility issue.');
					}
				}, 5000);
			})();
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div id="ec-bootstrap-fallback" aria-live="polite">
			<div class="box">
				<p class="title">ExileCompass failed to render</p>
				<p class="hint" id="ec-bootstrap-fallback-text">Waiting for frontend initialization...</p>
			</div>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
